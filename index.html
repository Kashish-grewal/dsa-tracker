<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Pattern Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #f5f3ef;
  --surface: #eeeae4;
  --card: #faf9f7;
  --border: #e0dbd2;
  --border2: #ccc6bb;
  --accent: #7c6fcd;
  --accent2: #6c5fc7;
  --accent-dim: #ede9fb;
  --text: #2d2a26;
  --text2: #6b6560;
  --text3: #a09890;
  --done: #d4d0f0;
  --easy: #d4edda;
  --easy-t: #2d7a4f;
  --med: #fef3cd;
  --med-t: #8a6200;
  --hard: #fde0e0;
  --hard-t: #b83232;
  --bonus-border: #f0e5d0;
  --bonus-bg: #fdf8f0;
  --bonus-accent: #c07820;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 16px 80px;
}

.wrap { max-width: 820px; margin: 0 auto; }

/* HEADER */
.header { margin-bottom: 24px; }
.logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: #1a1814; letter-spacing: -0.02em; margin-bottom: 2px; }
.logo span { color: var(--accent); }
.tagline { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }

/* PROGRESS */
.progress-block { margin-bottom: 20px; }
.progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.progress-label { font-size: 11px; color: var(--text3); }
.progress-count { font-size: 11px; color: var(--accent2); font-weight: 500; }
.pbar-outer { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pbar-inner { height: 100%; background: linear-gradient(90deg, #7c6fcd, #a78bfa); border-radius: 2px; transition: width 0.4s ease; }

/* TABS */
.tab-section { margin-bottom: 6px; }
.tab-label { font-size: 9px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
.tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.tab {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  padding: 5px 12px; border-radius: 4px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text3); cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.03em;
}
.tab:hover { border-color: #c8c0f0; color: #6c5fc7; }
.tab.on { background: #ede9fb; color: #6c5fc7; border-color: #b8b0e8; }
.tab.bonus { border-color: #f0d8b0; color: #a07030; }
.tab.bonus:hover { border-color: #d8a060; color: #c07820; }
.tab.bonus.on { background: #fef0d8; color: #c07820; border-color: #e0b870; }

.divider { font-size: 9px; color: #a09070; letter-spacing: 0.12em; text-transform: uppercase; margin: 12px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #e8ddc8; }

/* PATTERN CARD */
.pcard { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; overflow: hidden; background: var(--card); transition: border-color 0.15s; }
.pcard:hover { border-color: var(--border2); }
.pcard.bonus-card { border-color: #f0d8b0; background: #fdf8f0; }

.pc-head { padding: 12px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; user-select: none; }
.pc-head:hover { background: #f0ede8; }
.bonus-card .pc-head:hover { background: #fdf5e8; }

.ph-num { font-size: 10px; color: var(--text3); min-width: 22px; padding-top: 2px; flex-shrink: 0; font-weight: 500; }

.ph-body { flex: 1; min-width: 0; }
.ph-name { font-size: 12px; font-weight: 600; color: #1a1814; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; }
.bonus-label { font-size: 8px; padding: 1px 5px; border-radius: 3px; background: #fef0d8; color: #a06020; border: 1px solid #f0d8a8; letter-spacing: 0.06em; font-weight: 400; font-family: 'JetBrains Mono', monospace; }

.ph-idea { font-size: 10px; color: var(--text3); line-height: 1.6; margin-bottom: 4px; }

/* VARIANT TAGS */
.ph-variants { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.vtag { font-size: 9px; padding: 2px 7px; border-radius: 3px; background: #ede9fb; color: #7c6fcd; border: 1px solid #d8d0f4; letter-spacing: 0.03em; }
.vtag.key { background: #ddf4ec; color: #2d7a5a; border-color: #b8e4d0; }

.ph-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding-top: 2px; }
.ph-prog { font-size: 10px; color: var(--text3); }
.chev { font-size: 9px; color: var(--text3); transition: transform 0.2s; display: inline-block; }
.chev.open { transform: rotate(180deg); }

/* QUESTION LIST */
.qlist { border-top: 1px solid var(--border); display: none; }
.qlist.open { display: block; }

/* PATTERN NOTE */
.pattern-note {
  padding: 10px 14px 10px 48px;
  background: #f0ede8;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--text2);
  line-height: 1.7;
}
.bonus-card .pattern-note { background: #fdf5e8; }
.note-head { font-size: 9px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.6; }
.note-rule { margin-bottom: 3px; }
.note-rule b { color: #7c6fcd; font-weight: 500; }
.note-when { margin-top: 6px; font-size: 9px; }
.note-when b { color: #2d7a4f; }

.qrow { display: flex; align-items: center; gap: 10px; padding: 7px 14px 7px 48px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.qrow:last-child { border-bottom: none; }
.qrow:hover { background: #ece8e2; }
.bonus-card .qrow:hover { background: #fdf0e0; }
.qrow.done { opacity: 0.4; }

.qcheck { width: 12px; height: 12px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; position: relative; transition: all 0.15s; }
.qrow.done .qcheck { background: var(--accent); border-color: var(--accent); }
.qrow.done .qcheck::after { content: ''; position: absolute; top: 1px; left: 3px; width: 3px; height: 6px; border-right: 2px solid #faf9f7; border-bottom: 2px solid #faf9f7; transform: rotate(45deg); }

.qname { flex: 1; font-size: 11px; color: #4a4540; line-height: 1.4; }
.qrow.done .qname { text-decoration: line-through; color: var(--text3); }

.qwhy { font-size: 9px; color: var(--text3); margin-top: 2px; opacity: 0.7; }

.qtags { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
.te { background: var(--easy); color: var(--easy-t); }
.tm { background: var(--med); color: var(--med-t); }
.th { background: var(--hard); color: var(--hard-t); }
.vtag-q { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #ede9fb; color: #7c6fcd; border: 1px solid #d8d0f4; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.filter-btn { font-size: 9px; font-family: 'JetBrains Mono', monospace; padding: 3px 9px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
.filter-btn:hover { border-color: var(--border2); color: var(--text2); }
.filter-btn.on { background: #ede9fb; color: #7c6fcd; border-color: #d8d0f4; }
.filter-label { font-size: 9px; color: var(--text3); opacity: 0.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">DSA <span>//</span> Pattern Tracker</div>
    <div class="tagline">pattern-first · variant-complete · notes-ready</div>
  </div>

  <div class="progress-block">
    <div class="progress-row">
      <span class="progress-label">overall progress</span>
      <span class="progress-count" id="st">0 / 0</span>
    </div>
    <div class="pbar-outer"><div class="pbar-inner" id="pb" style="width:0%"></div></div>
  </div>

  <div class="tab-section">
    <div class="tab-label">core patterns</div>
    <div class="tabs" id="tabs-core"></div>
    <div class="divider">advanced / cp only</div>
    <div class="tabs" id="tabs-bonus"></div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">show:</span>
    <button class="filter-btn on" onclick="setFilter('all')">all</button>
    <button class="filter-btn" onclick="setFilter('e')">easy</button>
    <button class="filter-btn" onclick="setFilter('m')">med</button>
    <button class="filter-btn" onclick="setFilter('h')">hard</button>
    <button class="filter-btn" onclick="setFilter('todo')">todo</button>
  </div>

  <div id="main"></div>
</div>

<script>
const T = [
{id:'arrays', label:'Arrays', patterns:[
  {
    name:'Two Pointers — Opposite Ends',
    idea:'left=0, right=n-1, move inward. Trade off two variables against each other.',
    variants:['sorted array','water/height','palindrome check','sum target'],
    when:'Sorted array OR reasoning about what moving each end does. Brute force is O(n²) pairs.',
    rules:[
      {k:'Move rule', v:'Move the pointer that gives ZERO chance of improvement if kept. Always move the bottleneck.'},
      {k:'Trade-off', v:'Identify what two things fight each other (width vs height, sum vs target).'},
      {k:'Trigger', v:'"sorted", "pair", "container", "palindrome", "two numbers that..."'},
    ],
    qs:[
      {q:'Two Sum II — sorted array', d:'e', why:'Classic: sum<target→left++, sum>target→right--'},
      {q:'3Sum', d:'m', why:'Fix one, two-pointer the rest. Sort first. Skip duplicates.'},
      {q:'Container with most water', d:'m', why:'Move shorter wall — taller wall staying gives zero gain'},
      {q:'Trapping rain water', d:'h', why:'water[i]=min(maxL,maxR)-h[i]. Move smaller max side.'},
      {q:'Sort colors — Dutch flag', d:'m', why:'3 pointers: low/mid/high. mid=0→swap low, mid=2→swap high no mid++'},
      {q:'Valid palindrome', d:'e', why:'Match from both ends, skip non-alphanumeric'},
      {q:'Squares of sorted array', d:'e', why:'Largest squares at both ends, fill result from back'},
    ]
  },
  {
    name:'Two Pointers — Slow + Fast (Same Direction)',
    idea:'slow marks valid zone, fast explores. Fast always moves, slow moves on condition.',
    variants:['cycle detection','find middle','remove in-place','nth from end'],
    when:'"cycle", "middle", "remove duplicates in-place", "nth from end", "no extra space"',
    rules:[
      {k:'Slow', v:'Last known good / valid position. Only moves when fast finds something useful.'},
      {k:'Fast', v:'Always moves. Explores ahead.'},
      {k:'Gap trick', v:'Move fast N steps ahead first → when fast hits end, slow is at target.'},
    ],
    qs:[
      {q:'Remove duplicates from sorted array', d:'e', why:'slow=last unique. fast scans. copy when nums[fast]!=nums[slow]'},
      {q:'Move zeroes', d:'e', why:'slow=next non-zero slot. fast scans. swap when non-zero found'},
      {q:'Remove element in-place', d:'e', why:'slow=write pointer. fast=read pointer. write when not equal to val'},
      {q:'Find duplicate — Floyd cycle', d:'m', why:'slow+1 fast+2 find meet point, then reset one to start'},
      {q:'Longest mountain in array', d:'m', why:'expand from each peak with two pointers'},
    ]
  },
  {
    name:'Sliding Window — Fixed Size',
    idea:'Window size k is given. Add right, remove left, every window is valid.',
    variants:['max/min sum','average','contains target','fixed constraint'],
    when:'"subarray of size k", "window of length k", "exactly k elements"',
    rules:[
      {k:'Structure', v:'Build first window, then slide: add nums[i], remove nums[i-k]'},
      {k:'Update', v:'Update answer every single slide — every window is valid'},
      {k:'Use if not while', v:'Fixed size — exactly one enters, one leaves. No need to loop shrink.'},
    ],
    qs:[
      {q:'Max sum subarray of size K', d:'e', why:'Pure fixed window. Add right, remove left, track max.'},
      {q:'Max subarray of size K with all distinct', d:'m', why:'Fixed size + constraint → use map, check map.size()==k'},
      {q:'First negative in every window of K', d:'m', why:'Track negatives in deque or count as window slides'},
      {q:'Count anagrams of pattern in string', d:'m', why:'Fixed window=pattern.size(). freq map comparison.'},
    ]
  },
  {
    name:'Sliding Window — Variable Size',
    idea:'Find longest/shortest window satisfying a condition. Expand right always, shrink left on violation.',
    variants:['longest valid','shortest valid','at most K','exactly K = atMost(K)-atMost(K-1)'],
    when:'"longest", "shortest", "minimum length", "maximum length subarray/substring"',
    rules:[
      {k:'Template', v:'expand right → if violated: while(violated){shrink left} → update answer after while'},
      {k:'Violation', v:'Define exactly what breaks the window. That is your while condition.'},
      {k:'Exactly K trick', v:'exactlyK(arr,K) = atMostK(arr,K) - atMostK(arr,K-1)'},
      {k:'Update timing', v:'Update answer AFTER shrinking. Never inside the shrink loop.'},
    ],
    qs:[
      {q:'Longest substring without repeating chars', d:'m', why:'violation: freq[s[right]]>1. shrink until gone.'},
      {q:'Longest substring with at most K distinct', d:'m', why:'violation: map.size()>k. shrink until <=k.'},
      {q:'Fruit into baskets', d:'m', why:'Same as at most 2 distinct. map.size()>2 → shrink.'},
      {q:'Minimum window substring', d:'h', why:'FLIPPED: shrink when VALID (cnt==0). Minimize valid window.'},
      {q:'Longest subarray with sum ≤ K', d:'m', why:'violation: sum>k. shrink left until sum<=k.'},
      {q:'Longest ones with at most K zeros', d:'m', why:'violation: zeros in window > k. shrink.'},
      {q:'Subarrays with K different integers', d:'h', why:'exactlyK = atMostK(K) - atMostK(K-1)'},
    ]
  },
  {
    name:'Prefix Sum',
    idea:'Build prefix array once in O(n). Then any range sum in O(1). Pair with hashmap for subarray problems.',
    variants:['range query','subarray sum=K','XOR subarray','2D matrix'],
    when:'"range sum", "subarray sum equals", "how many subarrays with sum..."',
    rules:[
      {k:'Formula', v:'sum(L,R) = prefix[R] - prefix[L-1]'},
      {k:'HashMap trick', v:'Store prefix sums in map. For sum=K: look for prefix[i]-K in map.'},
      {k:'XOR variant', v:'Same idea. prefix[i] XOR prefix[j] = XOR of subarray. Find prefix^K in map.'},
      {k:'2D', v:'prefix[i][j] = prefix[i-1][j] + prefix[i][j-1] - prefix[i-1][j-1] + grid[i][j]'},
    ],
    qs:[
      {q:'Range sum query — immutable', d:'e', why:'Direct prefix application. Build once, query many.'},
      {q:'Subarray sum equals K', d:'m', why:'HashMap: count of prefix sums. Look for prefix-K.'},
      {q:'Product of array except self', d:'m', why:'Prefix product from left × suffix product from right'},
      {q:'Count subarrays with given XOR', d:'m', why:'XOR prefix + map. Count prefix^K occurrences.'},
      {q:'2D matrix range sum', d:'m', why:'2D prefix formula. Inclusion-exclusion for rectangle query.'},
      {q:'Subarray sum divisible by K', d:'m', why:'Store prefix%K in map. Same remainder = divisible subarray.'},
      {q:'Longest subarray with equal 0s and 1s', d:'m', why:'Replace 0→-1. Find longest subarray with sum=0. Prefix+map.'},
    ]
  },
  {
    name:"Kadane / Carry-Forward",
    idea:'Rolling value that resets when it becomes a liability. At each step: extend or restart.',
    variants:['max subarray','min subarray','max product','circular','stocks'],
    when:'"maximum subarray", "contiguous", "at least one element", "buy sell stock"',
    rules:[
      {k:'Core', v:'curr = max(nums[i], curr + nums[i]). If extending hurts, restart.'},
      {k:'Reset condition', v:'curr + nums[i] < nums[i] means curr is negative drag. Drop it.'},
      {k:'Product variant', v:'Track both max and min (negative×negative=positive). Swap on negative number.'},
      {k:'Circular', v:'max(normal Kadane, total_sum - min_subarray_kadane). Edge: all negative.'},
    ],
    qs:[
      {q:"Maximum subarray — Kadane's", d:'e', why:'curr=max(n[i], curr+n[i]). ans=max(ans,curr)'},
      {q:'Best time to buy and sell stock I', d:'e', why:'Track min so far. profit=price-minSoFar.'},
      {q:'Maximum product subarray', d:'m', why:'Track maxP and minP. Swap on negative element.'},
      {q:'Circular subarray maximum', d:'m', why:'max(kadane, total - min_kadane). Handle all-negative.'},
      {q:'Best time stocks II — multiple transactions', d:'m', why:'Carry forward: add every upward slope greedily.'},
    ]
  },
  {
    name:'In-place Rearrangement',
    idea:'Rotate/rearrange using index math, swaps, or cyclic sort. No extra array needed.',
    variants:['rotate matrix','cyclic sort','next permutation','set zeroes'],
    when:'"in-place", "O(1) space", "rotate", "missing/duplicate in range [1,n]"',
    rules:[
      {k:'Rotate matrix', v:'Transpose (swap i,j and j,i) then reverse each row. Two steps.'},
      {k:'Cyclic sort', v:'Each num[i] belongs at index num[i]-1. Keep swapping until placed.'},
      {k:'Next permutation', v:'Find rightmost dip, find smallest larger to its right, swap, reverse suffix.'},
    ],
    qs:[
      {q:'Rotate matrix 90°', d:'m', why:'Transpose then reverse rows. Two-step in-place.'},
      {q:'Next permutation', d:'m', why:'Find break from right, swap with smallest larger, reverse suffix.'},
      {q:'Set matrix zeroes', d:'m', why:'Use first row/col as markers. Two-pass approach.'},
      {q:'Find the duplicate — cyclic sort', d:'m', why:'Place each num at its index. Duplicate = cant place.'},
      {q:'Missing number — XOR / cyclic sort', d:'e', why:'XOR all indices and values. Missing cancels out.'},
      {q:'Find all missing numbers in array', d:'m', why:'Cyclic sort then scan for nums[i]!=i+1.'},
    ]
  },
]},

{id:'binsearch', label:'Binary Search', patterns:[
  {
    name:'Classic — Sorted Array',
    idea:'Halve the search space each step. Always ask: does mid satisfy, or do I go left or right?',
    variants:['exact match','first occurrence','last occurrence','insert position'],
    when:'Array is sorted. Looking for a specific value or boundary.',
    rules:[
      {k:'Template', v:'lo=0,hi=n-1. while(lo<=hi): mid=(lo+hi)/2. adjust lo/hi based on comparison.'},
      {k:'Boundary search', v:'For first: when found, keep going left (hi=mid-1). For last: keep going right (lo=mid+1).'},
      {k:'lo<hi vs lo<=hi', v:'lo<=hi for exact match. lo<hi for boundary (converge to single answer).'},
    ],
    qs:[
      {q:'Binary search classic', d:'e', why:'Template problem. Exact match.'},
      {q:'Search insert position', d:'e', why:'Return lo when not found — lo = correct insert spot.'},
      {q:'First and last position of element', d:'m', why:'Two binary searches: leftmost and rightmost.'},
      {q:'Search in 2D matrix', d:'m', why:'Treat as 1D sorted array. mid → row=mid/cols, col=mid%cols.'},
      {q:'Count occurrences of a number', d:'e', why:'lastPos - firstPos + 1 using two BS calls.'},
      {q:'Floor and ceil in sorted array', d:'e', why:'Floor=largest ≤ target. Ceil=smallest ≥ target. Track during BS.'},
    ]
  },
  {
    name:'Rotated / Modified Array',
    idea:'One half is always sorted. Check which half is sorted, then decide where target lies.',
    variants:['rotated search','find minimum','find peak','single element'],
    when:'Array was sorted but then rotated. Or has exactly one anomaly.',
    rules:[
      {k:'Key insight', v:'In rotated array, one half is always perfectly sorted. Check left half: nums[lo]<=nums[mid].'},
      {k:'Which half', v:'If sorted half contains target → go there. Else go to other half.'},
      {k:'Find min', v:'Min is at the inflection point. Go toward unsorted half.'},
      {k:'Peak element', v:'If nums[mid]<nums[mid+1] → peak is to the right. Else to the left.'},
    ],
    qs:[
      {q:'Search in rotated sorted array', d:'m', why:'Check which half sorted, determine if target in that half.'},
      {q:'Find minimum in rotated array', d:'m', why:'Go toward the unsorted (smaller) half each time.'},
      {q:'Find peak element', d:'m', why:'Binary search on slope direction.'},
      {q:'Single element in sorted array', d:'m', why:'Pairs break at single element. Check even index parity.'},
      {q:'Search in rotated array with duplicates', d:'m', why:'Same but handle nums[lo]==nums[mid] edge: lo++.'},
    ]
  },
  {
    name:'Binary Search on Answer',
    idea:"Don't search an array — BS the range of valid answers. Key question: is X feasible?",
    variants:['minimize max','maximize min','find threshold','split array'],
    when:'"minimum possible maximum", "maximum possible minimum", "feasibility check" on a value range.',
    rules:[
      {k:'Setup', v:'lo=min_possible_answer, hi=max_possible_answer.'},
      {k:'Check function', v:'Write canDo(x): can we achieve this answer? This is the entire problem.'},
      {k:'Direction', v:'Minimize max → if feasible go left (hi=mid). Maximize min → if feasible go right (lo=mid).'},
      {k:'Trigger', v:'"at most", "at least", "minimum number of", "divide into K parts"'},
    ],
    qs:[
      {q:'Koko eating bananas', d:'m', why:'BS on speed. canEat(speed): sum(ceil(piles[i]/speed)) <= h.'},
      {q:'Capacity to ship in D days', d:'m', why:'BS on capacity. canShip(cap): simulate days needed.'},
      {q:'Aggressive cows / allocate min pages', d:'m', why:'BS on min distance/pages. canPlace(dist) check.'},
      {q:'Split array — minimize largest sum', d:'h', why:'BS on answer. canSplit(maxSum,k) check.'},
      {q:'Minimize max distance — gas stations', d:'h', why:'BS on distance. Count stations needed.'},
      {q:'Nth root of a number', d:'m', why:'BS on answer range. Check mid^n == target.'},
    ]
  },
  {
    name:'BS on Two Arrays / Lower-Upper Bound',
    idea:'Partition both arrays simultaneously. Or find boundaries (first/last valid position).',
    variants:['median two arrays','kth element','lower bound','upper bound'],
    when:'Two sorted arrays. Or finding exact boundary position in sorted data.',
    rules:[
      {k:'Lower bound', v:'First position where nums[i] >= target. Left-biased BS.'},
      {k:'Upper bound', v:'First position where nums[i] > target. Right-biased BS.'},
      {k:'Median two arrays', v:'Partition both. Left of partition ≤ right of partition on both arrays.'},
    ],
    qs:[
      {q:'Median of two sorted arrays', d:'h', why:'Binary search partition on smaller array.'},
      {q:'Kth element of two sorted arrays', d:'m', why:'Generalization of median. Eliminate k/2 elements each step.'},
      {q:'Smallest letter greater than target', d:'e', why:'Upper bound on circular sorted array.'},
      {q:'H-index', d:'m', why:'Binary search on answer h. Count papers with citations >= h.'},
    ]
  },
]},

{id:'recursion', label:'Recursion + BT', patterns:[
  {
    name:'Pick / Not Pick — Subsets',

const SK = 'dsa_v4_complete';
let state = {};
try { state = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
let activeTopic = 'arrays';
let openCards = {};
let activeFilter = 'all';

function save() { try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e) {} }
function qkey(tid, pi, qi) { return tid + '__' + pi + '__' + qi; }
function totalAll() { let t=0; T.forEach(tp=>tp.patterns.forEach(p=>t+=p.qs.length)); return t; }
function doneAll() { return Object.values(state).filter(Boolean).length; }

function updateGlobal() {
  const tot = totalAll(), dn = doneAll();
  document.getElementById('st').textContent = dn + ' / ' + tot + ' done';
  document.getElementById('pb').style.width = Math.round(dn/tot*100) + '%';
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  renderMain();
}

function renderTabs() {
  const core = T.filter(t => !t.bonus);
  const bonus = T.filter(t => t.bonus);
  document.getElementById('tabs-core').innerHTML = core.map(t =>
    `<button class="tab${t.id===activeTopic?' on':''}" onclick="setTopic('${t.id}')">${t.label}</button>`
  ).join('');
  document.getElementById('tabs-bonus').innerHTML = bonus.map(t =>
    `<button class="tab bonus${t.id===activeTopic?' on':''}" onclick="setTopic('${t.id}')">${t.label}</button>`
  ).join('');
}

function patternDone(tid, pi) {
  const p = T.find(t=>t.id===tid).patterns[pi];
  return p.qs.filter((_,qi)=>state[qkey(tid,pi,qi)]).length;
}

function shouldShow(q, pi, qi) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'todo') return !state[qkey(activeTopic, pi, qi)];
  return q.d === activeFilter;
}

function renderMain() {
  const topic = T.find(t => t.id === activeTopic);
  const isBonus = !!topic.bonus;
  document.getElementById('main').innerHTML = topic.patterns.map((p, pi) => {
    const dn = patternDone(activeTopic, pi), tot = p.qs.length;
    const isOpen = !!openCards[activeTopic+'__'+pi];
    const visibleQs = p.qs.filter((q,qi) => shouldShow(q, pi, qi));

    const variantHtml = p.variants ? p.variants.map(v => `<span class="vtag key">${v}</span>`).join('') : '';

    const rulesHtml = p.rules ? p.rules.map(r =>
      `<div class="note-rule"><b>${r.k}:</b> ${r.v}</div>`
    ).join('') : '';

    const whenHtml = p.when ? `<div class="note-when"><b>Trigger: </b>${p.when}</div>` : '';

    const qHtml = visibleQs.length === 0 ? `<div style="padding:10px 14px 10px 48px;font-size:10px;color:var(--text3)">No problems match this filter.</div>` :
      visibleQs.map((q, _) => {
        const qi = p.qs.indexOf(q);
        const k = qkey(activeTopic, pi, qi);
        const done = !!state[k];
        return `<div class="qrow${done?' done':''}" id="qr_${pi}_${qi}" onclick="toggleQ('${k}',${pi},${qi})">
          <div class="qcheck"></div>
          <div class="qname">
            ${q.q}
            ${q.why ? `<div class="qwhy">${q.why}</div>` : ''}
          </div>
          <div class="qtags">
            <span class="tag t${q.d}">${q.d==='e'?'easy':q.d==='m'?'med':'hard'}</span>
          </div>
        </div>`;
      }).join('');

    return `<div class="pcard${isBonus?' bonus-card':''}">
      <div class="pc-head" onclick="toggleCard(${pi})">
        <div class="ph-num">${String(pi+1).padStart(2,'0')}</div>
        <div class="ph-body">
          <div class="ph-name">${p.name}${isBonus?'<span class="bonus-label">CP / advanced</span>':''}</div>
          <div class="ph-idea">${p.idea}</div>
          <div class="ph-variants">${variantHtml}</div>
        </div>
        <div class="ph-right">
          <span class="ph-prog">${dn}/${tot}</span>
          <span class="chev${isOpen?' open':''}">▼</span>
        </div>
      </div>
      <div class="qlist${isOpen?' open':''}" id="ql_${pi}">
        <div class="pattern-note">
          <div class="note-head">// pattern rules</div>
          ${rulesHtml}
          ${whenHtml}
        </div>
        ${qHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(pi) {
  const key = activeTopic + '__' + pi;
  openCards[key] = !openCards[key];
  renderMain();
}

function toggleQ(k, pid, qid) {
  state[k] = !state[k];
  save();
  const row = document.getElementById('qr_' + pid + '_' + qid);
  if (row) row.classList.toggle('done', state[k]);
  const dn = patternDone(activeTopic, pid);
  const tot = T.find(t=>t.id===activeTopic).patterns[pid].qs.length;
  const prog = document.getElementById('prog_' + pid);
  if (prog) prog.textContent = dn + '/' + tot;
  updateGlobal();
}

function setTopic(id) {
  activeTopic = id;
  renderTabs();
  renderMain();
}

renderTabs();
renderMain();
updateGlobal();
</script>
</body>
</html>
